<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>터널 3D 포인트클라우드 뷰어</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: #1a1a2e; 
            font-family: 'Segoe UI', sans-serif;
        }
        #canvas-container { width: 100vw; height: 100vh; }

        /* 상단 정보 바 */
        #info-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        #info-bar .title { font-size: 16px; font-weight: bold; }
        #info-bar .controls { color: #aaa; }

        /* 말풍선 툴팁 */
        #tooltip {
            position: fixed;
            display: none;
            background: rgba(20, 20, 40, 0.95);
            border: 1px solid #4a9eff;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 13px;
            pointer-events: auto;
            cursor: pointer;
            max-width: 280px;
            box-shadow: 0 4px 20px rgba(74, 158, 255, 0.3);
            z-index: 200;
            transition: opacity 0.2s;
        }
        #tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #4a9eff;
        }
        #tooltip .defect-label {
            font-weight: bold;
            color: #4a9eff;
            margin-bottom: 4px;
        }
        #tooltip .defect-type {
            color: #ffaa00;
            font-size: 11px;
            margin-bottom: 4px;
        }
        #tooltip .defect-desc {
            color: #ccc;
            font-size: 12px;
            margin-bottom: 6px;
        }
        #tooltip .click-hint {
            color: #888;
            font-size: 11px;
            text-align: center;
            border-top: 1px solid #333;
            padding-top: 6px;
            margin-top: 4px;
        }

        /* 사진 모달 */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 500;
            cursor: pointer;
        }
        #modal-overlay.active { display: flex; }
        #modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(74, 158, 255, 0.4);
        }
        #modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #modal-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 16px;
        }
        #modal-info .label { font-size: 18px; font-weight: bold; color: #4a9eff; }
        #modal-info .desc { font-size: 13px; color: #ccc; margin-top: 4px; }
        #modal-close {
            position: absolute;
            top: 10px; right: 14px;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 로딩 */
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 18px;
            z-index: 1000;
        }
        #loading.hidden { display: none; }
    </style>
</head>
<body>
    <div id="info-bar">
        <span class="title">터널 3D 포인트클라우드</span>
        <span class="controls">회전: 좌클릭 드래그 | 이동: 우클릭 드래그 | 확대: 스크롤 | 결함 마커: 클릭</span>
    </div>

    <div id="tooltip">
        <div class="defect-label"></div>
        <div class="defect-type"></div>
        <div class="defect-desc"></div>
        <div class="click-hint">클릭하면 사진 보기</div>
    </div>

    <div id="modal-overlay">
        <div id="modal-close">&times;</div>
        <div id="modal-content">
            <img id="modal-img" src="" alt="">
            <div id="modal-info">
                <div class="label"></div>
                <div class="desc"></div>
            </div>
        </div>
    </div>

    <div id="loading">데이터 로딩 중...</div>
    <div id="canvas-container"></div>

    <!-- Three.js (ES Module) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        // ==============================
        // 전역 변수
        // ==============================
        let scene, camera, renderer, controls;
        let defectMarkers = [];  // 결함 마커 Mesh 배열
        let defectsData = [];    // 결함 JSON 데이터
        let raycaster, mouse;
        let hoveredMarker = null;

        const tooltip = document.getElementById('tooltip');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalImg = document.getElementById('modal-img');
        const modalInfo = document.getElementById('modal-info');
        const loading = document.getElementById('loading');

        // ==============================
        // 초기화
        // ==============================
        function init() {
            const container = document.getElementById('canvas-container');

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(25, -30, 20);
            camera.up.set(0, 0, 1);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;
            controls.target.set(25, 0, 3);

            // Light
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, -50, 50);
            scene.add(dirLight);

            // Raycaster
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Events
            window.addEventListener('resize', onResize);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('click', onMouseClick);
            tooltip.addEventListener('click', onTooltipClick);
            modalOverlay.addEventListener('click', closeModal);
            document.getElementById('modal-close').addEventListener('click', closeModal);

            // 데이터 로드
            loadData();
        }

        // ==============================
        // 데이터 로드
        // ==============================
        async function loadData() {
            try {
                // 포인트클라우드
                const tunnelResp = await fetch('data/tunnel_points.json');
                const tunnelData = await tunnelResp.json();

                // 결함 데이터
                const defectsResp = await fetch('data/defects.json');
                defectsData = await defectsResp.json();

                createPointCloud(tunnelData);
                createCenterline(tunnelData.centerline);
                createDefectMarkers(defectsData);
                createEntranceExitMarkers(tunnelData.entrance, tunnelData.exit);
                createDistanceMarkers(tunnelData.centerline, tunnelData.length);
                createScaleBar();

                loading.classList.add('hidden');
                animate();
            } catch (e) {
                loading.textContent = '데이터 로드 실패: ' + e.message;
                console.error(e);
            }
        }

        // ==============================
        // 포인트클라우드 생성
        // ==============================
        function createPointCloud(data) {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(data.num_points * 3);
            const colors = new Float32Array(data.num_points * 3);

            for (let i = 0; i < data.num_points; i++) {
                positions[i * 3] = data.points[i][0];
                positions[i * 3 + 1] = data.points[i][1];
                positions[i * 3 + 2] = data.points[i][2];

                colors[i * 3] = data.colors[i][0];
                colors[i * 3 + 1] = data.colors[i][1];
                colors[i * 3 + 2] = data.colors[i][2];
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                sizeAttenuation: true,
            });

            const pointCloud = new THREE.Points(geometry, material);
            scene.add(pointCloud);
        }

        // ==============================
        // 중심선
        // ==============================
        function createCenterline(centerlineData) {
            const points = centerlineData.map(p => new THREE.Vector3(p[0], p[1], p[2]));
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
        }

        // ==============================
        // 입구 / 출구 마커
        // ==============================
        function createEntranceExitMarkers(entrance, exit) {
            // 입구 (초록 콘)
            const entranceGeo = new THREE.ConeGeometry(1.0, 2.5, 16);
            const entranceMat = new THREE.MeshPhongMaterial({
                color: 0x00ff88,
                emissive: 0x00aa44,
                emissiveIntensity: 0.4,
            });
            const entranceMesh = new THREE.Mesh(entranceGeo, entranceMat);
            entranceMesh.position.set(entrance[0], entrance[1], entrance[2] + 7);
            entranceMesh.rotation.set(Math.PI, 0, -Math.PI / 2); // 아래로 + 시계 90도
            scene.add(entranceMesh);

            // 출구 (파란 콘)
            const exitGeo = new THREE.ConeGeometry(1.0, 2.5, 16);
            const exitMat = new THREE.MeshPhongMaterial({
                color: 0x4499ff,
                emissive: 0x2266cc,
                emissiveIntensity: 0.4,
            });
            const exitMesh = new THREE.Mesh(exitGeo, exitMat);
            exitMesh.position.set(exit[0], exit[1], exit[2] + 7);
            exitMesh.rotation.set(Math.PI, 0, -Math.PI / 2); // 아래로 + 시계 90도
            scene.add(exitMesh);

            // 라벨 (HTML 오버레이 방식 — CSS2DRenderer 대신 sprite 사용)
            createTextSprite("입구", entrance, 0x00ff88);
            createTextSprite("출구", exit, 0x4499ff);
        }

        function createTextSprite(text, position, color) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.roundRect(10, 10, 236, 100, 12);
            ctx.fill();

            ctx.strokeStyle = '#' + color.toString(16).padStart(6, '0');
            ctx.lineWidth = 3;
            ctx.roundRect(10, 10, 236, 100, 12);
            ctx.stroke();

            ctx.font = 'bold 48px sans-serif';
            ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
            ctx.textAlign = 'center';
            ctx.fillText(text, 128, 75);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.set(position[0], position[1], position[2] + 10);
            sprite.scale.set(6, 3, 1);
            scene.add(sprite);
        }

        // ==============================
        // 거리 눈금 (바닥에 5m 간격)
        // ==============================
        function createDistanceMarkers(centerlineData, totalLength) {
            const step = 5; // 5m 간격
            const pointsPerMeter = centerlineData.length / totalLength;

            for (let dist = 0; dist <= totalLength; dist += step) {
                const idx = Math.min(Math.round(dist * pointsPerMeter), centerlineData.length - 1);
                const pos = centerlineData[idx];

                // 바닥에 작은 선 (눈금)
                const tickGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(pos[0], pos[1], pos[2] - 0.5),
                    new THREE.Vector3(pos[0], pos[1], pos[2] - 2.0),
                ]);
                const tickMat = new THREE.LineBasicMaterial({ color: 0x888888 });
                const tick = new THREE.Line(tickGeo, tickMat);
                scene.add(tick);

                // 거리 텍스트 스프라이트
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 64;
                const ctx = canvas.getContext('2d');

                ctx.font = 'bold 32px sans-serif';
                ctx.fillStyle = '#aaaaaa';
                ctx.textAlign = 'center';
                ctx.fillText(dist + 'm', 64, 42);

                const texture = new THREE.CanvasTexture(canvas);
                const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
                const sprite = new THREE.Sprite(spriteMat);
                sprite.position.set(pos[0], pos[1], pos[2] - 3.0);
                sprite.scale.set(3, 1.5, 1);
                scene.add(sprite);
            }
        }

        // ==============================
        // 스케일바 (좌하단 고정 — HTML 오버레이)
        // ==============================
        function createScaleBar() {
            const scaleDiv = document.createElement('div');
            scaleDiv.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 20px;
                background: rgba(0,0,0,0.7);
                border: 1px solid #555;
                border-radius: 6px;
                padding: 10px 16px;
                color: #fff;
                font-size: 12px;
                font-family: monospace;
                z-index: 100;
            `;
            scaleDiv.innerHTML = `
                <div style="margin-bottom:6px; color:#aaa;">축척 (Scale)</div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <div style="width:50px; height:3px; background:#4a9eff; border-left:2px solid #fff; border-right:2px solid #fff;"></div>
                    <span>5 m</span>
                </div>
                <div style="margin-top:6px; color:#888; font-size:11px;">1 : 1 (실척)</div>
            `;
            document.body.appendChild(scaleDiv);
        }

        // ==============================
        // 결함 마커 생성 (빨간 구체 — 클릭 대상)
        // ==============================
        function createDefectMarkers(defects) {
            defects.forEach((d, idx) => {
                // 외부 구체 (빨강, 반투명)
                const outerGeo = new THREE.SphereGeometry(0.7, 24, 24);
                const outerMat = new THREE.MeshPhongMaterial({
                    color: 0xff3333,
                    transparent: true,
                    opacity: 0.6,
                    emissive: 0xff0000,
                    emissiveIntensity: 0.3,
                });
                const outerSphere = new THREE.Mesh(outerGeo, outerMat);
                outerSphere.position.set(d.pos[0], d.pos[1], d.pos[2]);
                outerSphere.userData = { defectIndex: idx };
                scene.add(outerSphere);
                defectMarkers.push(outerSphere);

                // 내부 구체 (밝은 코어)
                const innerGeo = new THREE.SphereGeometry(0.3, 16, 16);
                const innerMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                const innerSphere = new THREE.Mesh(innerGeo, innerMat);
                innerSphere.position.set(d.pos[0], d.pos[1], d.pos[2]);
                scene.add(innerSphere);
            });
        }

        // ==============================
        // 마우스 이벤트
        // ==============================
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(defectMarkers);

            if (intersects.length > 0) {
                const marker = intersects[0].object;
                const idx = marker.userData.defectIndex;
                const defect = defectsData[idx];

                // 툴팁 표시
                tooltip.style.display = 'block';
                tooltip.style.left = (event.clientX - 100) + 'px';
                tooltip.style.top = (event.clientY - 120) + 'px';
                tooltip.querySelector('.defect-label').textContent = defect.label;
                tooltip.querySelector('.defect-type').textContent = '[' + defect.type + ']';
                tooltip.querySelector('.defect-desc').textContent = defect.description;
                tooltip.dataset.defectIndex = idx;

                // 마커 하이라이트
                if (hoveredMarker !== marker) {
                    if (hoveredMarker) hoveredMarker.material.emissiveIntensity = 0.3;
                    marker.material.emissiveIntensity = 0.8;
                    marker.material.opacity = 0.9;
                    hoveredMarker = marker;
                }

                renderer.domElement.style.cursor = 'pointer';
            } else {
                tooltip.style.display = 'none';
                if (hoveredMarker) {
                    hoveredMarker.material.emissiveIntensity = 0.3;
                    hoveredMarker.material.opacity = 0.6;
                    hoveredMarker = null;
                }
                renderer.domElement.style.cursor = 'grab';
            }
        }

        function onMouseClick(event) {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(defectMarkers);

            if (intersects.length > 0) {
                const idx = intersects[0].object.userData.defectIndex;
                showModal(idx);
            }
        }

        function onTooltipClick() {
            const idx = parseInt(tooltip.dataset.defectIndex);
            if (!isNaN(idx)) {
                showModal(idx);
            }
        }

        // ==============================
        // 사진 모달
        // ==============================
        function showModal(defectIndex) {
            const defect = defectsData[defectIndex];
            const imagePath = '../defect_images/' + defect.image;

            modalImg.src = imagePath;
            modalInfo.querySelector('.label').textContent = defect.label;
            modalInfo.querySelector('.desc').textContent = defect.description;
            modalOverlay.classList.add('active');
            tooltip.style.display = 'none';
        }

        function closeModal(e) {
            if (e.target === modalOverlay || e.target === document.getElementById('modal-close')) {
                modalOverlay.classList.remove('active');
            }
        }

        // ==============================
        // 리사이즈
        // ==============================
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==============================
        // 애니메이션 루프
        // ==============================
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // 결함 마커 펄스 효과
            const time = Date.now() * 0.003;
            defectMarkers.forEach((marker, i) => {
                const scale = 1.0 + 0.15 * Math.sin(time + i * 2);
                marker.scale.set(scale, scale, scale);
            });

            renderer.render(scene, camera);
        }

        // 시작
        init();
    </script>
</body>
</html>
